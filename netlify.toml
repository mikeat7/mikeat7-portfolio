# netlify.toml
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@aws-sdk/client-bedrock-runtime"]

# --- API FIRST (must be above the SPA catch-all) ---
# Specific function mappings (names don't match the splat pattern,
# so these MUST come before any wildcard fallback)

[[redirects]]
  from = "/agent/chat"
  to = "/.netlify/functions/agent-chat"
  status = 200
  force = true

[[redirects]]
  from = "/agent/fetch-url"
  to = "/.netlify/functions/agent-fetch-url"
  status = 200
  force = true

[[redirects]]
  from = "/agent/summarize"
  to = "/.netlify/functions/agent-summarize"
  status = 200
  force = true

[[redirects]]
  from = "/agent/keepalive"
  to = "/.netlify/functions/supabase-keepalive"
  status = 200
  force = true

# --- SPA CATCH-ALL MUST BE LAST ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
