name: Supabase Keep-Alive

on:
  schedule:
    # Every 5 days at 3:00 AM UTC
    - cron: "0 3 */5 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep-alive endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" https://clarityarmor.com/agent/keepalive)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" -ne 200 ]; then
            echo "::error::Keep-alive ping failed with status $status"
            exit 1
          fi
