name: Supabase Keep-Alive
on:
  schedule:
    # Runs on days 1,5,9,13,17,21,25,29 — never more than 4 days apart
    - cron: "0 3 1,5,9,13,17,21,25,29 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep-alive endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" https://clarityarmor.com/agent/keepalive)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" -ne 200 ]; then
            echo "::error::Keep-alive ping failed with status $status"
            exit 1
          fi
