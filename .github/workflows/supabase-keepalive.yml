name: Supabase Keep-Alive

on:
  schedule:
    # every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint (keep-alive)
        env:
          SUPABASE_URL: https://vcjxwlruvtstyvjytnaj.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          url="$SUPABASE_URL/rest/v1/keep_alive_ping?select=id&limit=1"
          max_attempts=3
          attempt=1

          until [ $attempt -gt $max_attempts ]; do
            echo "Attempt $attempt: GET $url"
            # include both Authorization and apikey headers for compatibility with some proxies
            response=$(curl -sS -w "\n%{http_code}" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$url" || true)

            body=$(echo "$response" | sed '$d' )
            status=$(echo "$response" | tail -n1)

            echo "HTTP Status: $status"
            echo "Body: $body"

            if [ "$status" = "200" ]; then
              echo "Keep-alive succeeded."
              exit 0
            fi

            attempt=$((attempt+1))
            sleep $(( attempt * 2 ))
          done

          echo "::error::Keep-alive ping failed after $max_attempts attempts."
          exit 1
